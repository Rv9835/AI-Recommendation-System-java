<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Recommendation Demo</title>
</head>
<body>
  <h1>AI Recommendation - Demo UI</h1>

  <section>
    <h2>Register</h2>
    <input id="reg_user" placeholder="user_id">
    <input id="reg_pass" placeholder="password" type="password">
    <input id="reg_first" placeholder="first_name">
    <input id="reg_last" placeholder="last_name">
    <button id="btn_register">Register</button>
    <pre id="reg_out"></pre>
  </section>

  <section>
    <h2>Login</h2>
    <input id="login_user" placeholder="user_id">
    <input id="login_pass" placeholder="password" type="password">
    <button id="btn_login">Login</button>
    <button id="btn_logout">Logout</button>
    <pre id="login_out"></pre>
  </section>

  <section>
    <h2>History (favorites)</h2>
    <button id="btn_history">Get History</button>
    <pre id="history_out"></pre>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
